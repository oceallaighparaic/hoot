<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% block header %}{% endblock %}
    <title>hoot!!!</title>
</head>
<body>
    <header>
        <form action="{{ url_for('html_search') }}" method="GET">
            <input type="text" id="search" name="search" {% if search %} value="{{ search }}" {% else %} placeholder="Search Users" {% endif %} />
            <input type="submit" value="Search" />
        </form>
    </header>

    <main>
        {% block main_content %}
        {% endblock %}
    </main>

    {% if message %}
        <h2>{{ message }}</h2>
    {% endif %}
</body>
</html>
