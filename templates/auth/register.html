{% extends "base.html" %}
{% from "macros.html" import create_field %}

{% block header %}
{% endblock %}

{% block main_content %}
    <form action="" method="POST" novalidate>
        {{ form.hidden_tag() }}

        {{ create_field(form.username) }}
        <br />

        {{ create_field(form.password) }}
        <br />

        {{ create_field(form.password2) }}
        <br />

        {{ form.submit() }}
    </form>
{% endblock %}
